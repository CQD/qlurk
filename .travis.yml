language: php

jobs:
  include:
    - php: 5.6
    - php: 7.0
    - php: 7.1
    - php: 7.2
    - php: 7.3
    - php: 7.4
    - php: 8.0
      env: COMPOSER_FLAGS="--ignore-platform-reqs"

notifications:
  email: false

install:
  - composer install --prefer-dist --optimize-autoloader $COMPOSER_FLAGS
  - composer show

script:
  - make e2e

